name: Auto-Post Instagram

on:
  schedule:
    # 16:00 UTC = 18:00 Berlin (Sommerzeit / CEST). Im Winter (CET) = 17:00.
    - cron: '0 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Karussell posten
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python post.py
      - name: PUBLISHED-Markierung zuruecksichern
        run: |
          git config user.name "kiai-autopost"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-Post: als veroeffentlicht markiert"
          git push
